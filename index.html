<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMS Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 p-6 shadow-md border-b border-slate-700">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide text-emerald-400">SEMS Panel</h1>
            <span class="px-3 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 animate-pulse">Live Server Connected</span>
        </div>
    </header>

    <main class="container mx-auto p-6 flex-grow grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col justify-between">
            <h2 class="text-slate-400 font-semibold uppercase text-sm">Room Status</h2>
            <div class="my-6">
                <span id="roomStatus" class="text-4xl font-extrabold text-amber-500">UNKNOWN</span>
            </div>
            <p class="text-slate-500 text-xs">Monitored via BT & Manual switches</p>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col justify-between">
            <h2 class="text-slate-400 font-semibold uppercase text-sm">Real-time Load</h2>
            <div class="my-6">
                <span id="currentLoad" class="text-5xl font-extrabold text-sky-400">0.00</span> <span class="text-slate-400 font-medium text-lg">Amps</span>
            </div>
            <p class="text-slate-500 text-xs">Updated via analog current sensor</p>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col h-64 md:h-auto">
            <h2 class="text-slate-400 font-semibold uppercase text-sm mb-4">Event Logs</h2>
            <div id="logConsole" class="bg-slate-950 p-4 rounded-xl flex-grow font-mono text-xs overflow-y-auto text-emerald-500 border border-slate-800 space-y-1">
                <div>[SYSTEM] Waiting for Arduino...</div>
            </div>
        </div>

    </main>

    <footer class="text-center p-4 text-slate-500 text-xs border-t border-slate-800">
        Group 8 - Smart Electricity Management System (SEMS)
    </footer>

    <script>
        const socket = io();
        const logConsole = document.getElementById('logConsole');
        const roomStatus = document.getElementById('roomStatus');
        const currentLoad = document.getElementById('currentLoad');

        // Append events to our live console
        function appendLog(message) {
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `<span class="text-slate-500">[${time}]</span> ${message}`;
            logConsole.appendChild(logEntry);
            logConsole.scrollTop = logConsole.scrollHeight; // Auto scroll
        }

        // Catch data sent from Node.js server
        socket.on('arduino-data', (data) => {
            appendLog(data);

            // Simple parser matches to update visual components
            if (data.includes("Access Authorized") || data.includes("Room Occupied")) {
                roomStatus.innerText = "OCCUPIED";
                roomStatus.className = "text-4xl font-extrabold text-emerald-400";
            } 
            else if (data.includes("Vacation rule") || data.includes("Room Vacant")) {
                roomStatus.innerText = "VACANT";
                roomStatus.className = "text-4xl font-extrabold text-rose-500";
            }
        });
    </script>
</body>
</html>
